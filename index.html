<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Knit Stitch Grid</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f5f5f5;
    }

    #controls {
      position: fixed;
      top: 10px;
      left: 10px;
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      z-index: 10;
    }

    #container {
      position: relative;
      width: 900px;
      height: 700px;
      margin: 80px auto;
      background: white;
      border: 1px solid #ccc;
      overflow: visible;
    }

    svg {
      display: block;
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    input, button {
      margin: 4px;
    }

    #palette {
      display: flex;
      flex-wrap: wrap;
      margin-top: 5px;
    }

    .swatch {
      width: 20px;
      height: 20px;
      margin: 2px;
      border: 1px solid #000;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="controls">
  Rows: <input id="rowsInput" type="number" value="6" min="1"><br>
  Cols: <input id="colsInput" type="number" value="10" min="1"><br>
  <button id="applyGrid">Apply Grid</button><br>

  <input type="color" id="colorPicker" value="#ff0000">
  <button id="saveColor">Save Color</button>

  <div id="palette"></div>

  <br>
  Zoom:
  <input id="zoomSlider" type="range" min="0.5" max="2" step="0.05" value="1">
</div>

<div id="container">
  <svg id="canvas" width="900" height="700"></svg>
  <div id="overlay"></div>
</div>

<script src="script.js"></script>
</body>
</html>
