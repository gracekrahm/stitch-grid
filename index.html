<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Knit Chart Editor</title>

<style>
  body {
    margin: 0;
    background: #f5f5f5;
    font-family: sans-serif;
  }

  #controls {
    position: fixed;
    top: 10px;
    left: 10px;
    background: white;
    padding: 12px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    z-index: 10;
    width: 260px;
  }

  label {
    font-size: 12px;
    display: block;
    margin-top: 8px;
  }

  input, select {
    width: 100%;
  }

  button {
    margin-top: 10px;
    width: 100%;
    padding: 6px;
    cursor: pointer;
  }

  #palette {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 6px;
  }

  .swatch {
    width: 20px;
    height: 20px;
    border: 1px solid #ccc;
    cursor: pointer;
  }

  /* Scrollable canvas area */
  #viewport {
    margin-left: 300px;
    height: 100vh;
    overflow: auto;
    position: relative;
    background: white;
  }

  #canvasWrapper {
    position: relative;
    padding: 40px;
  }

  svg {
    display: block;
  }

  .axis-label {
    font-size: 10px;
    fill: black;
  }
</style>
</head>

<body>

<div id="controls">
  <label>Rows</label>
  <input type="number" id="rowsInput" value="6" min="1" />

  <label>Stitches (Columns)</label>
  <input type="number" id="colsInput" value="10" min="1" />

  <label>Line Numbers</label>
  <select id="lineNumbersToggle">
    <option value="on">On</option>
    <option value="off">Off</option>
  </select>

  <label>Chart Mode</label>
  <select id="modeSelect">
    <option value="flat">Flat (RS/WS alternating)</option>
    <option value="round">In the Round (all rows same direction)</option>
  </select>

  <label>Quick Colors</label>
  <div id="palette"></div>

  <label>Stitch Color</label>
  <input type="color" id="colorPicker" value="#ff0000" />

  <button id="saveColor">Save Color to Palette</button>
  <button id="applyGrid">Apply Grid</button>
</div>

<div id="viewport">
  <div id="canvasWrapper">
    <svg id="canvas"></svg>
  </div>
</div>

<script>
const svgNS = "http://www.w3.org/2000/svg";
const svg = document.getElementById("canvas");

const STITCH_SIZE = 97;
const ROW_SPACING = 0.79;
const SCALE = 4;

/* ===== STITCH PATH ===== */
const stitchPathData = `m 0,0
c 0.0161,-1.85405 0.0151,-3.71528 -0.0418,-5.56693
-0.21376,-1.60508 -0.82301,-3.15569 -1.71114,-4.50377
-0.83955,-1.20233 -1.8919,0.15882 -2.47536,0.86493
-0.75126,0.76503 -1.39814,1.63108 -2.0184,2.506
-1.09808,1.67485 -2.19951,3.34692 -3.40046,4.94991
-0.46098,0.96625 -1.19549,1.81042 -1.24952,2.91779
-0.33647,1.91326 -0.25331,3.86606 -0.51202,5.7905
-0.14293,2.12408 -0.18126,4.25548 0.007,6.37822
-0.084,1.46207 0.009,2.94939 0.57817,4.31714
0.52977,0.82075 1.22534,-1.23227 1.77945,-1.62912
1.41695,-1.79237 2.33146,-3.93561 3.87033,-5.63961
0.80261,-0.8534 1.56054,-1.79847 2.48679,-2.50545
C -1.70964,6.6598 -1.02979,5.2123 -0.78582,3.66371
-0.50364,2.44765 -0.16887,1.23842 0,0 Z`;

/* ===== STATE ===== */
let rows = 6;
let cols = 10;
let selectedColor = "#ff0000";
let stitchColors = [];
let isDrawing = false;

/* ===== MODE SETTINGS ===== */
let showLineNumbers = true;
let mode = "flat";

/* ===== COLOR PALETTE ===== */
const defaultColors = [
  "#ffffff","#000000","#ff0000","#0000ff",
  "#00aa00","#ffff00","#ff00ff","#00ffff","#888888"
];

let paletteColors = [...defaultColors];
const paletteDiv = document.getElementById("palette");

function renderPalette() {
  paletteDiv.innerHTML = "";
  paletteColors.forEach(color => {
    const swatch = document.createElement("div");
    swatch.className = "swatch";
    swatch.style.background = color;

    swatch.addEventListener("click", () => {
      selectedColor = color;
      document.getElementById("colorPicker").value = color;
    });

    paletteDiv.appendChild(swatch);
  });
}

document.getElementById("saveColor").addEventListener("click", () => {
  const color = document.getElementById("colorPicker").value;
  if (!paletteColors.includes(color)) {
    paletteColors.push(color);
    renderPalette();
  }
  selectedColor = color;
});

/* ===== GRID INIT ===== */
function initGrid(r, c) {
  rows = r;
  cols = c;

  stitchColors = Array.from({ length: rows }, () =>
    Array.from({ length: cols }, () => "#ffffff")
  );
}

/* ===== RENDER GRID ===== */
function renderGrid() {
  svg.innerHTML = "";

  const canvasWidth = cols * STITCH_SIZE + 200;
  const canvasHeight = rows * STITCH_SIZE * ROW_SPACING + 200;

  svg.setAttribute("width", canvasWidth);
  svg.setAttribute("height", canvasHeight);

  const offsetX = 100;
  const offsetY = 100;

  /* Column numbers */
  if (showLineNumbers) {
    for (let c = 0; c < cols; c++) {
      const text = document.createElementNS(svgNS, "text");
      text.setAttribute("x", offsetX + c * STITCH_SIZE);
      text.setAttribute("y", 40);
      text.setAttribute("text-anchor", "middle");
      text.setAttribute("class", "axis-label");
      text.textContent = c + 1;
      svg.appendChild(text);
    }
  }

  for (let r = 0; r < rows; r++) {

    /* Row numbers */
    if (showLineNumbers) {
      const text = document.createElementNS(svgNS, "text");
      text.setAttribute("x", 20);
      text.setAttribute("y", offsetY + r * STITCH_SIZE * ROW_SPACING);
      text.setAttribute("dominant-baseline", "middle");
      text.setAttribute("class", "axis-label");
      text.textContent = r + 1;
      svg.appendChild(text);
    }

    for (let c = 0; c < cols; c++) {

      let displayCol = c;

      /* Flat mode reverses every other row */
      if (mode === "flat" && r % 2 === 1) {
        displayCol = cols - 1 - c;
      }

      /* Round mode: all rows right-to-left */
      if (mode === "round") {
        displayCol = cols - 1 - c;
      }

      const group = document.createElementNS(svgNS, "g");

      const path = document.createElementNS(svgNS, "path");
      path.setAttribute("d", stitchPathData);
      path.setAttribute("stroke", "#000");
      path.setAttribute("fill", stitchColors[r][displayCol]);
      path.setAttribute("stroke-width", "0.5");
      path.style.cursor = "pointer";

      function paint() {
        stitchColors[r][displayCol] = selectedColor;
        path.setAttribute("fill", selectedColor);
      }

      path.addEventListener("mousedown", (e) => {
        isDrawing = true;
        paint();
        e.preventDefault();
      });

      path.addEventListener("mouseenter", () => {
        if (isDrawing) paint();
      });

      group.appendChild(path);
      svg.appendChild(group);

      const bbox = path.getBBox();
      const cx = bbox.x + bbox.width / 2;
      const cy = bbox.y + bbox.height / 2;

      group.setAttribute(
        "transform",
        `
        translate(${offsetX + c * STITCH_SIZE}, ${offsetY + r * STITCH_SIZE * ROW_SPACING})
        translate(${-cx}, ${-cy})
        `
      );

      path.setAttribute("transform", `scale(${SCALE})`);
    }
  }
}

/* ===== INPUT HANDLING ===== */
window.addEventListener("mouseup", () => {
  isDrawing = false;
});

document.getElementById("colorPicker").addEventListener("input", (e) => {
  selectedColor = e.target.value;
});

document.getElementById("applyGrid").addEventListener("click", () => {
  const r = parseInt(document.getElementById("rowsInput").value);
  const c = parseInt(document.getElementById("colsInput").value);

  showLineNumbers = document.getElementById("lineNumbersToggle").value === "on";
  mode = document.getElementById("modeSelect").value;

  initGrid(r, c);
  renderGrid();
});

/* ===== INIT ===== */
renderPalette();
initGrid(rows, cols);
renderGrid();

</script>

</body>
</html>
