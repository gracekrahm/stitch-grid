<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Knit Chart Editor</title>

<style>
  body {
    font-family: sans-serif;
    background: #f5f5f5;
    text-align: center;
  }

  h1 {
    margin-top: 20px;
  }

  #toolbar {
    margin: 15px;
  }

  .color-btn {
    width: 30px;
    height: 30px;
    border: 2px solid #333;
    margin: 3px;
    cursor: pointer;
    display: inline-block;
  }

  .selected {
    outline: 3px solid black;
  }

  #chart {
    background: white;
    border: 1px solid #ccc;
  }
</style>
</head>

<body>

<h1>Knit Chart Editor</h1>

<div id="toolbar"></div>

<svg id="chart" width="600" height="600"></svg>

<script>
const rows = 30
const cols = 30
const stitchSize = 18

const colors = ["#ffffff", "#d62828", "#1d3557", "#2a9d8f", "#f4a261"]
let currentColor = colors[1]

// grid data
let grid = Array.from({length: rows}, () => Array(cols).fill(colors[0]))

const svg = document.getElementById("chart")
const toolbar = document.getElementById("toolbar")

// ---------- COLOR PALETTE ----------
colors.forEach(color => {
  const btn = document.createElement("div")
  btn.className = "color-btn"
  btn.style.background = color

  if (color === currentColor) btn.classList.add("selected")

  btn.onclick = () => {
    currentColor = color
    document.querySelectorAll(".color-btn").forEach(b => b.classList.remove("selected"))
    btn.classList.add("selected")
  }

  toolbar.appendChild(btn)
})

// ---------- STITCH SVG PATHS ----------
const LEFT_PATH = `
M 937.63749,54.408191
C -0.0611,-7.00744 -0.0567,-14.04199 0.15778,-21.04035
0.80793,-6.06647 3.11057,-11.92702 6.46727,-17.02215
3.17311,-4.54422 7.15056,0.60029 9.3558,3.26902
2.83935,2.89147 5.28426,6.16471 7.62854,9.47153
4.15023,6.33013 8.31309,12.64977 12.85209,18.70832
1.7423,3.65195 4.5184,6.84252 4.72255,11.02784
1.27173,7.23124 0.9574,14.6119 1.9352,21.885366
0.54015,8.02803 0.68507,16.08371 -0.0255,24.106673
0.31733,5.52591 -0.0326,11.14729 -2.18517,16.31675
-2.00222,3.10203 -4.63111,-4.65743 -6.72548,-6.15733
-5.35541,-6.7743 -8.81179,-14.87473 -14.628,-21.315043
-3.03344,-3.22546 -5.89808,-6.79739 -9.39885,-9.46943
-3.6938,-4.61031 -6.26331,-10.081156 -7.1854,-15.934086
-1.06654,-4.59616 -2.33185,-9.16648 -2.97085,-13.84711
Z
`

const RIGHT_PATH = `
M 1025.5476,54.408191
C 0.061,-7.00744 0.057,-14.04199 -0.1578,-21.04035
-0.8079,-6.06647 -3.1106,-11.92702 -6.4673,-17.02215
-3.1731,-4.54422 -7.1505,0.60029 -9.3557,3.26902
-2.8394,2.89147 -5.2843,6.16471 -7.6286,9.47153
-4.15022,6.33013 -8.31312,12.64977 -12.85212,18.70832
-1.7423,3.65195 -4.51837,6.84252 -4.72252,11.02784
-1.27173,7.23124 -0.9574,14.6119 -1.9352,21.885366
-0.54015,8.02803 -0.68507,16.08371 0.0255,24.106673
-0.31733,5.52591 0.0326,11.14729 2.18517,16.31675
2.00225,3.10203 4.63115,-4.65743 6.72545,-6.15733
5.3554,-6.7743 8.81182,-14.87473 14.62802,-21.315043
3.0335,-3.22546 5.8981,-6.79739 9.3989,-9.46943
3.6938,-4.61031 6.2633,-10.081156 7.1854,-15.934086
1.0665,-4.59616 2.3318,-9.16648 2.9708,-13.84711
Z
`

// ---------- STITCH CREATION ----------
function createStitchGroup(r, c) {
  const group = document.createElementNS("http://www.w3.org/2000/svg", "g")

  const scale = stitchSize / 120

  // ✅ FIXED: center stitch based on its true SVG center (~981, 120)
  group.setAttribute(
    "transform",
    `translate(${c * stitchSize}, ${r * stitchSize * 0.9}) scale(${scale}) translate(-981,-120)`
  )

  group.dataset.row = r
  group.dataset.col = c

  const left = document.createElementNS("http://www.w3.org/2000/svg", "path")
  const right = document.createElementNS("http://www.w3.org/2000/svg", "path")

  left.setAttribute("d", LEFT_PATH)
  right.setAttribute("d", RIGHT_PATH)

  const fillColor = grid[r][c]
  const isUncolored = fillColor === "#ffffff"

  left.setAttribute("fill", fillColor)
  right.setAttribute("fill", fillColor)

  left.setAttribute("stroke", "#000")
  right.setAttribute("stroke", "#000")

  left.setAttribute("stroke-width", isUncolored ? "0.6" : "0.3")
  right.setAttribute("stroke-width", isUncolored ? "0.6" : "0.3")

  group.appendChild(left)
  group.appendChild(right)

  return group
}

// ---------- BUILD GRID ----------
for (let r = 0; r < rows; r++) {
  for (let c = 0; c < cols; c++) {
    svg.appendChild(createStitchGroup(r, c))
  }
}

// ---------- CLICK HANDLING ----------
svg.addEventListener("click", (e) => {
  const group = e.target.closest("g")
  if (!group) return

  const r = group.dataset.row
  const c = group.dataset.col

  if (r === undefined || c === undefined) return

  grid[r][c] = currentColor

  group.querySelectorAll("path").forEach(p => {
    p.setAttribute("fill", currentColor)
  })
})

// ---------- DRAG PAINT ----------
let isMouseDown = false

svg.addEventListener("mousedown", () => isMouseDown = true)
svg.addEventListener("mouseup", () => isMouseDown = false)
svg.addEventListener("mouseleave", () => isMouseDown = false)

svg.addEventListener("mousemove", (e) => {
  if (!isMouseDown) return

  const group = e.target.closest("g")
  if (!group) return

  const r = group.dataset.row
  const c = group.dataset.col

  if (r === undefined || c === undefined) return

  grid[r][c] = currentColor

  group.querySelectorAll("path").forEach(p => {
    p.setAttribute("fill", currentColor)
  })
})

</script>

</body>
</html>
