<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Knit Grid</title>
<style>
  body { margin:0; font-family:sans-serif; background:#f5f5f5; }

  #controls {
    position: fixed;
    top: 10px;
    left: 10px;
    background: white;
    padding: 10px;
    border-radius: 8px;
    z-index: 10;
  }

  #viewport {
    width: 900px;
    height: 700px;
    margin: 80px auto;
    overflow: hidden;
    background: white;
    border: 1px solid #ccc;
  }

  #canvasContainer {
    position: relative;
    width: 100%;
    height: 100%;
    transform-origin: top left;
  }

  svg {
    position: absolute;
    top: 0;
    left: 0;
  }

  #overlay {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
  }

  .num {
    position: absolute;
    font-weight: bold;
    color: black;
    font-size: 14px;
  }

  input, button { margin: 4px; }
</style>
</head>
<body>

<div id="controls">
  Rows: <input id="rowsInput" type="number" value="6"><br>
  Cols: <input id="colsInput" type="number" value="10"><br>
  <button id="applyGrid">Apply</button><br>

  Zoom:
  <input id="zoomSlider" type="range" min="1" max="2" step="0.05" value="1">
</div>

<div id="viewport">
  <div id="canvasContainer">
    <svg id="canvas" width="900" height="700"></svg>
    <div id="overlay"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
