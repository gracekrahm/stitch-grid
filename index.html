<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Knit Chart Editor</title>

<style>
  body {
    margin: 0;
    background: #f5f5f5;
    font-family: sans-serif;
    overflow: auto; /* allow scrolling */
  }

  #controls {
    position: fixed;
    top: 10px;
    left: 10px;
    background: white;
    padding: 12px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    z-index: 10;
    width: 260px;
  }

  label {
    font-size: 12px;
    display: block;
    margin-top: 8px;
  }

  input {
    width: 100%;
  }

  button {
    margin-top: 10px;
    width: 100%;
    padding: 6px;
    cursor: pointer;
  }

  #palette {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 8px;
  }

  .swatch {
    width: 20px;
    height: 20px;
    border: 1px solid #ccc;
    cursor: pointer;
  }

  svg {
    display: block;
    margin: 120px auto;
    background: white;
    transform-origin: center center;
  }
</style>
</head>

<body>

<div id="controls">
  <label>Rows</label>
  <input type="number" id="rowsInput" value="6" min="1" />

  <label>Stitches (Columns)</label>
  <input type="number" id="colsInput" value="10" min="1" />

  <label>Quick Colors</label>
  <div id="palette"></div>

  <label>Custom Color</label>
  <input type="color" id="colorPicker" value="#ff0000" />

  <button id="applyGrid">Apply Grid</button>
</div>

<svg id="canvas" width="1200" height="900"></svg>

<script>
const svgNS = "http://www.w3.org/2000/svg";
const svg = document.getElementById("canvas");

/* ===== SETTINGS ===== */
const STITCH_SIZE = 97;
const ROW_SPACING = 0.79;
const SCALE = 4;

/* ===== COLORS ===== */
const quickColors = [
  "#ffffff", "#000000", "#ff0000", "#0000ff",
  "#00aa00", "#ffff00", "#ff00ff", "#00ffff",
  "#888888", "#a52a2a"
];

let selectedColor = "#ff0000";
let isDrawing = false;

/* ===== STITCH PATH ===== */
const stitchPathData = `m 0,0 ... Z`; // (unchanged for brevity, keep your full path here)

/* ===== STATE ===== */
let rows = 6;
let cols = 10;
let stitchColors = [];

/* ===== INIT GRID ===== */
function initGrid(r, c) {
  rows = r;
  cols = c;

  stitchColors = Array.from({ length: rows }, () =>
    Array.from({ length: cols }, () => "#ffffff")
  );
}

/* ===== RENDER ===== */
function renderGrid() {
  svg.innerHTML = "";

  const canvasWidth = 1200;
  const canvasHeight = 900;

  const gridWidth = (cols - 1) * STITCH_SIZE;
  const gridHeight = (rows - 1) * STITCH_SIZE * ROW_SPACING;

  const offsetX = (canvasWidth - gridWidth) / 2;
  const offsetY = (canvasHeight - gridHeight) / 2;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {

      const group = document.createElementNS(svgNS, "g");

      const path = document.createElementNS(svgNS, "path");
      path.setAttribute("d", stitchPathData);
      path.setAttribute("stroke", "#000");
      path.setAttribute("fill", stitchColors[r][c]);
      path.setAttribute("stroke-width", "0.5");
      path.style.cursor = "pointer";

      function paint() {
        stitchColors[r][c] = selectedColor;
        path.setAttribute("fill", selectedColor);
      }

      path.addEventListener("mousedown", (e) => {
        isDrawing = true;
        paint();
        e.preventDefault();
      });

      path.addEventListener("mouseenter", () => {
        if (isDrawing) paint();
      });

      group.appendChild(path);
      svg.appendChild(group);

      const bbox = path.getBBox();
      const cx = bbox.x + bbox.width / 2;
      const cy = bbox.y + bbox.height / 2;

      group.setAttribute(
        "transform",
        `
        translate(${offsetX + c * STITCH_SIZE}, ${offsetY + r * STITCH_SIZE * ROW_SPACING})
        translate(${-cx}, ${-cy})
        `
      );

      path.setAttribute("transform", `scale(${SCALE})`);
    }
  }
}

/* ===== PALETTE UI ===== */
function buildPalette() {
  const palette = document.getElementById("palette");
  palette.innerHTML = "";

  quickColors.forEach(color => {
    const swatch = document.createElement("div");
    swatch.className = "swatch";
    swatch.style.background = color;
    swatch.addEventListener("click", () => {
      selectedColor = color;
      document.getElementById("colorPicker").value = color;
    });
    palette.appendChild(swatch);
  });
}

/* ===== UI EVENTS ===== */
document.getElementById("colorPicker").addEventListener("input", (e) => {
  selectedColor = e.target.value;
});

document.getElementById("applyGrid").addEventListener("click", () => {
  const r = parseInt(document.getElementById("rowsInput").value);
  const c = parseInt(document.getElementById("colsInput").value);

  initGrid(r, c);
  renderGrid();
});

/* Stop drawing when mouse released */
window.addEventListener("mouseup", () => {
  isDrawing = false;
});

/* ===== ZOOM ===== */
let scale = 1;

svg.addEventListener("wheel", (e) => {
  e.preventDefault();

  const zoomFactor = 0.1;
  if (e.deltaY < 0) {
    scale += zoomFactor;
  } else {
    scale = Math.max(0.2, scale - zoomFactor);
  }

  svg.style.transform = `scale(${scale})`;
});

/* ===== INIT ===== */
buildPalette();
initGrid(rows, cols);
renderGrid();

</script>

</body>
</html>
