<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Knit Chart Editor</title>

<style>
  body {
    margin: 0;
    background: #f5f5f5;
    font-family: sans-serif;
  }

  #controls {
    position: fixed;
    top: 10px;
    left: 10px;
    background: white;
    padding: 12px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    z-index: 10;
    width: 260px;
  }

  label {
    font-size: 12px;
    display: block;
    margin-top: 8px;
  }

  input {
    width: 100%;
  }

  button {
    margin-top: 10px;
    width: 100%;
    padding: 6px;
    cursor: pointer;
  }

  #palette {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }

  .color-swatch {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid #ccc;
  }

  .selected {
    outline: 2px solid black;
  }

  svg {
    display: block;
    margin: auto;
    background: white;
  }
</style>
</head>

<body>

<div id="controls">

  <label>Rows</label>
  <input type="number" id="rowsInput" value="6" min="1" />

  <label>Stitches (Columns)</label>
  <input type="number" id="colsInput" value="10" min="1" />

  <div id="palette"></div>

  <label>Custom Color</label>
  <input type="color" id="colorPicker" value="#ff0000" />

  <button id="applyGrid">Apply Grid</button>

</div>

<svg id="canvas" width="900" height="700" viewBox="0 0 900 700"></svg>

<script>
const svgNS = "http://www.w3.org/2000/svg";
const svg = document.getElementById("canvas");

/* ===== FIXED GAUGE ===== */
const STITCH_SIZE = 97;
const ROW_SPACING = 0.79;
const SCALE = 4;

/* ===== STITCH PATH ===== */
const stitchPathData = `
m 0,0
c 0.0161,-1.85405 0.0151,-3.71528 -0.0418,-5.56693
-0.21376,-1.60508 -0.82301,-3.15569 -1.71114,-4.50377
-0.83955,-1.20233 -1.8919,0.15882 -2.47536,0.86493
-0.75126,0.76503 -1.39814,1.63108 -2.0184,2.506
-1.09808,1.67485 -2.19951,3.34692 -3.40046,4.94991
-0.46098,0.96625 -1.19549,1.81042 -1.24952,2.91779
-0.33647,1.91326 -0.25331,3.86606 -0.51202,5.7905
-0.14293,2.12408 -0.18126,4.25548 0.007,6.37822
-0.084,1.46207 0.009,2.94939 0.57817,4.31714
0.52977,0.82075 1.22534,-1.23227 1.77945,-1.62912
1.41695,-1.79237 2.33146,-3.93561 3.87033,-5.63961
0.80261,-0.8534 1.56054,-1.79847 2.48679,-2.50545
C -1.70964,6.6598 -1.02979,5.2123 -0.78582,3.66371
-0.50364,2.44765 -0.16887,1.23842 0,0
Z
`;

/* ===== STATE ===== */
let rows = 6;
let cols = 10;

let selectedColor = "#ff0000";
let isDrawing = false;

let stitchColors = [];

/* ===== PRESET COLORS ===== */
const presetColors = [
  "#000000", "#ffffff", "#ff0000", "#00ff00", "#0000ff",
  "#ffff00", "#ff00ff", "#00ffff", "#888888", "#ff9900"
];

/* ===== INIT GRID ===== */
function initGrid(r, c) {
  rows = r;
  cols = c;

  stitchColors = Array.from({ length: rows }, () =>
    Array.from({ length: cols }, () => "#ffffff")
  );
}

/* ===== PALETTE UI ===== */
function buildPalette() {
  const palette = document.getElementById("palette");
  palette.innerHTML = "";

  presetColors.forEach(color => {
    const swatch = document.createElement("div");
    swatch.className = "color-swatch";
    swatch.style.background = color;

    swatch.addEventListener("click", () => {
      selectedColor = color;
      document.querySelectorAll(".color-swatch").forEach(s => s.classList.remove("selected"));
      swatch.classList.add("selected");
      document.getElementById("colorPicker").value = color;
    });

    palette.appendChild(swatch);
  });
}

/* ===== RENDER ===== */
function renderGrid() {
  svg.innerHTML = "";

  const canvasWidth = 900;
  const canvasHeight = 700;

  const gridWidth = (cols - 1) * STITCH_SIZE;
  const gridHeight = (rows - 1) * STITCH_SIZE * ROW_SPACING;

  const offsetX = (canvasWidth - gridWidth) / 2;
  const offsetY = (canvasHeight - gridHeight) / 2;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {

      const group = document.createElementNS(svgNS, "g");

      group.setAttribute(
        "transform",
        `
        translate(${offsetX + c * STITCH_SIZE}, ${offsetY + r * STITCH_SIZE * ROW_SPACING})
        `
      );

      const path = document.createElementNS(svgNS, "path");
      path.setAttribute("d", stitchPathData);
      path.setAttribute("stroke", "#000");
      path.setAttribute("fill", stitchColors[r][c]);
      path.setAttribute("stroke-width", "0.5");

      path.setAttribute("transform", `scale(${SCALE})`);
      path.style.cursor = "pointer";

      function paint() {
        stitchColors[r][c] = selectedColor;
        path.setAttribute("fill", selectedColor);
      }

      path.addEventListener("mousedown", () => {
        isDrawing = true;
        paint();
      });

      path.addEventListener("mouseenter", () => {
        if (isDrawing) paint();
      });

      group.appendChild(path);
      svg.appendChild(group);
    }
  }
}

/* ===== GLOBAL MOUSE STATE ===== */
document.addEventListener("mouseup", () => {
  isDrawing = false;
});

/* ===== COLOR PICKER ===== */
document.getElementById("colorPicker").addEventListener("input", (e) => {
  selectedColor = e.target.value;
});

/* ===== APPLY GRID ===== */
document.getElementById("applyGrid").addEventListener("click", () => {
  const r = parseInt(document.getElementById("rowsInput").value);
  const c = parseInt(document.getElementById("colsInput").value);

  initGrid(r, c);
  renderGrid();
});

/* ===== INIT ===== */
buildPalette();
initGrid(rows, cols);
renderGrid();

</script>

</body>
</html>
